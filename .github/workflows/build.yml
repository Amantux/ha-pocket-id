name: Build & Release

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: amantux/ha-pocket-id

jobs:
  # ──────────────────────────────────────────────────────────────
  # 1. Read version from config.yaml and check if a release already exists
  # ──────────────────────────────────────────────────────────────
  version:
    name: Read version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag_exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version from config.yaml
        id: ver
        run: |
          VERSION=$(grep '^version:' addons/pocket_id/config.yaml | awk '{print $2}' | tr -d '"')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Check if release tag already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          if gh release view "v${VERSION}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${VERSION} already exists"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag v${VERSION} is new"
          fi

  # ──────────────────────────────────────────────────────────────
  # 2. Build multi-arch Docker images and push to GHCR
  # ──────────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: version
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
          - arch: armv7
            platform: linux/arm/v7

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: addons/pocket_id
          platforms: ${{ matrix.platform }}
          push: ${{ needs.version.outputs.tag_exists == 'false' || github.event_name == 'push' }}
          build-args: |
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_FROM=ghcr.io/home-assistant/${{ matrix.arch }}-base:3.21
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.arch }}:${{ needs.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.arch }}:latest

  # ──────────────────────────────────────────────────────────────
  # 3. Create GitHub release (only when version is new)
  # ──────────────────────────────────────────────────────────────
  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: [version, build]
    if: github.event_name == 'push' && needs.version.outputs.tag_exists == 'false'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog entry
        id: notes
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          {
            echo "notes<<EOF"
            echo "${NOTES}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: v${{ needs.version.outputs.version }}
          body: ${{ steps.notes.outputs.notes }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
